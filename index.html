      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;flex-wrap:wrap;gap:.5rem">
        <span style="font-size:.8rem;font-weight:700;color:var(--text-sub)">${studyIdx + 1} / ${studyList.length}</span>
        <span class="c-tag">${v.cat}</span>
      </div>
      <div class="quiz-progress-wrap"><div class="quiz-progress-fill" style="width:${pctW}%"></div></div>
      <div class="study-card">
        <div class="study-front">
          <div class="study-word">${v.en}${v.important >= 4 ? '<span class="star-badge">★</span>' : ''}</div>
          ${v.pron ? `<div class="study-pron">/${v.pron}/</div>` : ''}
          <button onclick="speak('${esc(v.en)}')" style="background:none;border:none;font-size:1.4rem;cursor:pointer;margin-top:.3rem;padding:6px;border-radius:8px" aria-label="Pronounce">🔊</button>
          ${!studyShown ? `<div style="margin-top:1rem"><button class="btn btn-primary" onclick="revealStudy()">👁 Show Meaning</button></div>` : ''}
        </div>
        ${studyShown ? `<div class="study-back">
          <div style="font-family:'Noto Serif Bengali',serif;font-size:1.45rem;font-weight:700;margin-bottom:.6rem;line-height:1.4">${v.bn}</div>
          ${v.ex_en ? `<div style="font-size:.93rem;font-style:italic;color:var(--text-sub);line-height:1.5;margin-bottom:.5rem;border-left:3px solid var(--accent);padding-left:.75rem;font-weight:600">${v.ex_en}</div>` : ''}
          ${v.ex_bn ? `<div style="font-family:'Noto Serif Bengali',serif;font-size:1.05rem;font-weight:600;line-height:1.5;margin-bottom:.6rem">${v.ex_bn}</div>` : ''}
          ${fam ? `<div class="c-family-wrap">${fam}</div>` : ''}
          <div class="study-rate-row">
            <button class="study-rate-btn know"     onclick="studyRate(2)">✅ Know it</button>
            <button class="study-rate-btn unsure"   onclick="studyRate(1)">🤔 Unsure</button>
            <button class="study-rate-btn dontknow" onclick="studyRate(0)">❌ Don't know</button>
          </div>
        </div>` : ''}
      </div>
    </div>`;
}

function revealStudy(){ studyShown = true; renderStudy(); }

function studyRate(q){
  triggerHaptic();
  const v = studyList[studyIdx];
  srsRate(v.en, q);
  progress[v.en] = q >= 2 ? 'm' : 'r';
  recordStudied(v.en);
  updateStats();
  studyIdx++; studyShown = false; renderStudy();
}

/* ══ QUIZ ════════════════════════════════════════════════════════ */
function clearQuizTimer(){ clearInterval(qTimerInt); qTimerInt = null; }

function startQuiz(){
  triggerHaptic(); clearQuizTimer();
  const cat   = document.getElementById('quiz-cat').value;
  const count = parseInt(document.getElementById('quiz-count').value) || 10;
  const mode  = document.getElementById('quiz-mode').value;
  const pool  = vocab.filter(v => !cat || v.cat === cat);
  if(pool.length < 4){ showToast('Need at least 4 words in this category.'); return; }
  const actual = Math.min(count, pool.length);
  qList = pool.sort(() => Math.random() - .5).slice(0, actual).map(cor => {
    const wrongs = pool.filter(p => p.en !== cor.en).sort(() => Math.random() - .5).slice(0, 3);
    const opts   = [cor, ...wrongs].sort(() => Math.random() - .5);
    const dir    = mode === 'mixed' ? (Math.random() > .5 ? 'bn' : 'en') : mode;
    return {cor, opts, dir};
  });
  qIdx = 0; qScore = 0; qWrong = [];
  renderQuiz();
}

function renderQuiz(){
  clearQuizTimer();
  const area = document.getElementById('quiz-area');
  if(qIdx >= qList.length){
    const pct   = Math.round(qScore / qList.length * 100);
    const emoji = pct >= 80 ? '🎯' : pct >= 50 ? '💪' : '📖';
    const msg   = pct >= 80 ? 'Excellent!' : pct >= 50 ? 'Good effort!' : 'Keep practising!';
    const wrongHTML = qWrong.length ? `
      <div style="text-align:left;margin-top:1rem">
        <div style="font-size:.76rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-sub);margin-bottom:.5rem">❌ Wrong Answers (${qWrong.length})</div>
        <div class="wrong-review-list">
          ${qWrong.map(w => `<div class="wrong-review-item">
            <span class="wr-en">${w.en}</span>
            <span class="wr-bn">${w.bn}</span>
            <button onclick="speak('${esc(w.en)}')" style="background:none;border:none;font-size:.92rem;cursor:pointer;padding:3px;border-radius:6px" aria-label="Hear ${w.en}">🔊</button>
          </div>`).join('')}
        </div>
      </div>` : '';
    area.innerHTML = `<div class="quiz-score-screen">
      <h1>${emoji}</h1>
      <h2>${msg}</h2>
      <p style="color:var(--text-sub);margin-bottom:.8rem">Score: <strong>${qScore} / ${qList.length}</strong> (${pct}%)</p>
      ${wrongHTML}
      <div style="display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap;margin-top:1.2rem">
        <button class="btn btn-primary" onclick="startQuiz()">🔄 Retry Quiz</button>
        <button class="btn btn-outline" onclick="showV('study')">📖 Study</button>
        <button class="btn btn-outline" onclick="showV('browse')">📚 Browse</button>
      </div>
    </div>`;
    return;
  }

  const q   = qList[qIdx];
  const pct = (qIdx / qList.length * 100).toFixed(0);
  const timerSecs = parseInt(document.getElementById('quiz-timer-sel').value) || 0;
  const isBN = q.dir === 'bn';
  const questionText  = isBN ? q.cor.en : q.cor.bn;
  const questionClass = isBN ? '' : 'bn';
  const optHTML = q.opts.map(o => {
    const label = isBN ? o.bn : o.en;
    const cls   = isBN ? '' : 'en-opt';
    return `<div class="q-opt${cls ? ' ' + cls : ''}" onclick="checkQ(this,${o.en === q.cor.en},'${esc(q.cor.bn)}')" role="button" tabindex="0"
      onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click()}">${label}</div>`;
  }).join('');

  area.innerHTML = `<div class="quiz-card">
    <div class="quiz-progress-wrap"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-header">
      <span class="quiz-qnum">Q ${qIdx + 1} / ${qList.length}</span>
      ${timerSecs ? `<span class="quiz-timer ok" id="q-timer" role="timer">${timerSecs}s</span>` : ''}
      <span class="quiz-score-b">✅ ${qScore}</span>
    </div>
    <div class="quiz-direction">${isBN ? 'English → বাংলা' : 'বাংলা → English'}</div>
    <div class="quiz-word${questionClass ? ' ' + questionClass : ''}">${questionText}</div>
    <div id="q-opts">${optHTML}</div>
  </div>`;

  if(timerSecs){
    qTimerSec = timerSecs;
    qTimerInt = setInterval(() => {
      qTimerSec--;
      const el = document.getElementById('q-timer');
      if(!el){ clearQuizTimer(); return; }
      el.textContent = qTimerSec + 's';
      el.className = 'quiz-timer ' + (qTimerSec > 7 ? 'ok' : qTimerSec > 3 ? 'warn' : 'danger');
      if(qTimerSec <= 0){
        clearQuizTimer();
        const opts = document.getElementById('q-opts');
        if(opts && !opts.dataset.locked){
          opts.dataset.locked = '1';
          qWrong.push(qList[qIdx].cor);
          const corText = qList[qIdx].dir === 'bn' ? qList[qIdx].cor.bn : qList[qIdx].cor.en;
          opts.querySelectorAll('.q-opt').forEach(o => {
            if(o.textContent.trim() === corText.trim()) o.classList.add('correct');
          });
          showToast('⏱️ Time up!', 1000);
          setTimeout(() => { qIdx++; renderQuiz(); }, 1300);
        }
      }
    }, 1000);
  }
}

function checkQ(btn, isCor, corBn){
  triggerHaptic(); clearQuizTimer();
  const cont = document.getElementById('q-opts');
  if(!cont || cont.dataset.locked) return;
  cont.dataset.locked = '1';
  // Disable all options
  cont.querySelectorAll('.q-opt').forEach(o => { o.style.pointerEvents = 'none'; o.removeAttribute('tabindex'); });
  if(isCor){
    btn.classList.add('correct');
    qScore++;
    recordStudied(qList[qIdx].cor.en);
  } else {
    btn.classList.add('wrong');
    qWrong.push(qList[qIdx].cor);
    const q = qList[qIdx];
    const corText = q.dir === 'bn' ? q.cor.bn : q.cor.en;
    cont.querySelectorAll('.q-opt').forEach(o => {
      if(o.textContent.trim() === corText.trim()) o.classList.add('correct');
    });
  }
  setTimeout(() => { qIdx++; renderQuiz(); }, 1300);
}

/* ══ SPELLING TEST ═══════════════════════════════════════════════ */
function initSpell(){
  triggerHaptic();
  const cat  = document.getElementById('spell-cat').value;
  const fltr = document.getElementById('spell-filter').value;
  let pool   = vocab.filter(v => !cat || v.cat === cat);
  if(fltr === 'review')    pool = pool.filter(v => progress[v.en] === 'r');
  else if(fltr === 'important') pool = pool.filter(v => v.important >= 4);
  else if(fltr === 'new') pool = pool.filter(v => !progress[v.en]);
  if(!pool.length){ showToast('No words found for this filter.'); return; }
  spellList  = pool.sort(() => Math.random() - .5);
  spellIdx = 0; spellOk = 0; spellNo = 0; spellHints = 0;
  renderSpell();
  showToast('✍️ ' + spellList.length + ' words to spell');
}

function renderSpell(){
  const area = document.getElementById('spell-area');
  if(spellIdx >= spellList.length){
    const tot = spellOk + spellNo;
    const pct = tot ? Math.round(spellOk / tot * 100) : 0;
    area.innerHTML = `<div class="quiz-score-screen">
      <h1>${pct >= 80 ? '🎯' : pct >= 50 ? '✍️' : '📖'}</h1>
      <h2>${pct >= 80 ? 'Excellent Spelling!' : pct >= 50 ? 'Good job!' : 'Keep practising!'}</h2>
      <div class="spell-score-row" style="margin-bottom:1.2rem">
        <div class="spell-stat"><span>Correct</span><span style="color:var(--correct)">${spellOk}</span></div>
        <div class="spell-stat"><span>Wrong</span><span style="color:var(--wrong)">${spellNo}</span></div>
        <div class="spell-stat"><span>Score</span><span style="color:var(--accent)">${pct}%</span></div>
      </div>
      <div style="display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="initSpell()">🔄 Retry</button>
        <button class="btn btn-outline" onclick="showV('browse')">📚 Browse</button>
      </div>
    </div>`;
    return;
  }

  const v     = spellList[spellIdx];
  const boxes = v.en.split('').map((_,i) => `<div class="letter-box" id="lb-${i}">_</div>`).join('');
  const pctW  = (spellIdx / spellList.length * 100).toFixed(0);

  area.innerHTML = `<div class="spell-card">
    <div class="quiz-progress-wrap"><div class="quiz-progress-fill" style="width:${pctW}%"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;gap:.4rem">
      <span class="quiz-qnum">${spellIdx + 1} / ${spellList.length}</span>
      <span style="font-size:.8rem;font-weight:700;color:var(--correct)">✅ ${spellOk}</span>
      <span style="font-size:.8rem;font-weight:700;color:var(--wrong)">❌ ${spellNo}</span>
    </div>
    <div class="spell-clue">${v.bn}</div>
    ${v.pron  ? `<div class="spell-pron">/${v.pron}/</div>` : ''}
    <div class="letter-boxes" aria-label="Letter boxes">${boxes}</div>
    <input class="spell-input" id="spell-inp" type="text"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      placeholder="Type the English word…"
      aria-label="Type your answer">
    <div class="spell-result" id="spell-res" aria-live="polite"></div>
    <div style="display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:.7rem">
      <button class="btn btn-primary" onclick="checkSpell()">✔ Check</button>
      <button class="btn btn-outline" onclick="hintSpell()">💡 Hint</button>
      <button class="btn" style="border:1.5px solid var(--border)" onclick="skipSpell()">⏭ Skip</button>
    </div>
    <button onclick="speak('${esc(v.en)}')" style="background:none;border:none;font-size:.9rem;cursor:pointer;color:var(--text-sub);padding:6px;border-radius:8px" aria-label="Hear the word">🔊 Hear the word</button>
  </div>`;

  const inp = document.getElementById('spell-inp');
  inp.addEventListener('keydown', e => { if(e.key === 'Enter') checkSpell(); });
  inp.addEventListener('input', () => {
    const val = inp.value;
    const word = v.en;
    // Update letter boxes live
    word.split('').forEach((ch, i) => {
      const lb = document.getElementById('lb-' + i);
      if(!lb) return;
      if(val[i] === undefined){
        lb.textContent = '_'; lb.className = 'letter-box';
      } else if(val[i].toLowerCase() === word[i].toLowerCase()){
        lb.textContent = word[i]; lb.className = 'letter-box correct-box';
      } else {
        lb.textContent = val[i]; lb.className = 'letter-box wrong-box';
      }
    });
    // Extra chars warning
    if(val.length > word.length){
      inp.style.borderColor = 'var(--wrong)';
    } else {
      inp.style.borderColor = '';
    }
    // Auto-submit once user types the full length correctly
    if(val.length === word.length && val.toLowerCase() === word.toLowerCase()){
      checkSpell();
    }
  });
  setTimeout(() => inp.focus(), 100);
}

function hintSpell(){
  triggerHaptic();
  const v = spellList[spellIdx];
  spellHints++;
  for(let i = 0; i < Math.min(spellHints, v.en.length); i++){
    const lb = document.getElementById('lb-' + i);
    if(lb){ lb.textContent = v.en[i]; lb.className = 'letter-box revealed'; }
  }
  const inp = document.getElementById('spell-inp');
  if(inp) inp.value = v.en.slice(0, spellHints);
}

function checkSpell(){
  triggerHaptic();
  const v   = spellList[spellIdx];
  const inp = document.getElementById('spell-inp');
  const res = document.getElementById('spell-res');
  if(!inp || !res) return;
  const val = inp.value.trim().toLowerCase();
  if(val === v.en.toLowerCase()){
    inp.className = 'spell-input correct-inp';
    res.innerHTML = `✅ Correct!${v.ex_en ? `<div class="spell-reveal-ex">${v.ex_en}</div>` : ''}`;
    res.className = 'spell-result ok';
    spellOk++;
    recordStudied(v.en);
    v.en.split('').forEach((_, i) => {
      const lb = document.getElementById('lb-' + i);
      if(lb){ lb.textContent = v.en[i]; lb.className = 'letter-box correct-box'; }
    });
    setTimeout(() => { spellIdx++; spellHints = 0; renderSpell(); }, 1400);
  } else {
    inp.className = 'spell-input wrong-inp';
    res.innerHTML = `❌ Answer: <strong>${v.en}</strong>${v.ex_en ? `<div class="spell-reveal-ex">${v.ex_en}</div>` : ''}`;
    res.className = 'spell-result no';
    spellNo++;
    setTimeout(() => { spellIdx++; spellHints = 0; renderSpell(); }, 2000);
  }
}

function skipSpell(){
  triggerHaptic(); spellHints = 0; spellIdx++; renderSpell();
}

/* ══ SAVED / LIBRARY ═════════════════════════════════════════════ */
function renderSaved(){
  const list = vocab.filter(v => progress[v.en]);
  const grid = document.getElementById('grid-saved');
  if(!list.length){
    grid.innerHTML = `<div class="empty-state">
      <h3>📭 Library is empty</h3>
      <p>Mark words as Mastered or Review to add them here.</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(v => createCard(v)).join('');
}

/* ══ EXPORT ══════════════════════════════════════════════════════ */
function exportProgress(){
  triggerHaptic();
  const entries = Object.entries(progress);
  if(!entries.length){ showToast('No progress to export yet.'); return; }
  const rows = ['Word,Bengali,Pronunciation,Category,Status,SRS_Next'];
  entries.forEach(([en, st]) => {
    const v = vocab.find(x => x.en === en);
    const srsNext = srsData[en] ? new Date(srsData[en].next).toLocaleDateString() : '';
    rows.push(`"${en}","${v ? v.bn : ''}","${v ? v.pron : ''}","${v ? v.cat : ''}","${st}","${srsNext}"`);
  });
  try{
    const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8'});
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `hscvb-progress-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('✅ Progress exported successfully!');
  } catch(e){
    showToast('❌ Export failed. Try again.');
  }
}

/* ══ RESET ═══════════════════════════════════════════════════════ */
function clearProg(){
  triggerHaptic();
  if(confirm('Reset ALL progress and SRS data?\n\nThis cannot be undone.')){
    progress = {}; srsData = {};
    try{
      localStorage.removeItem('hscSRS');
      localStorage.removeItem('hscEliteData');
    }catch(e){}
    updateStats();
    renderBrowse();
    renderSaved();
    showToast('🔄 All progress has been reset.');
  }
}

/* ══ ANNOUNCEMENT POPUP ══════════════════════════════════════════ */
let annDismissKey = 'hscAnnDismiss_' + TODAY.replace(/ /g,'_');

function showAnnouncement(){
  // Collect all unique popup entries from the sheet (col I = title, col J = msg)
  const entries = vocab.filter(v => v.popup_title && v.popup_msg)
    .reduce((acc, v) => {
      const key = v.popup_title + '||' + v.popup_msg;
      if(!acc.seen.has(key)){ acc.seen.add(key); acc.list.push({title:v.popup_title, msg:v.popup_msg}); }
      return acc;
    }, {seen: new Set(), list: []}).list;

  if(!entries.length) return;

  // Check if dismissed today
  try{ if(localStorage.getItem(annDismissKey)) return; }catch(e){}

  // Pick a random entry if multiple
  const entry = entries[Math.floor(Math.random() * entries.length)];

  document.getElementById('ann-title-el').textContent = entry.title;
  document.getElementById('ann-msg-el').textContent   = entry.msg;

  // Show after brief delay
  setTimeout(() => {
    document.getElementById('ann-overlay').classList.add('open');
  }, 800);
}

function closeAnn(){
  triggerHaptic();
  document.getElementById('ann-overlay').classList.remove('open');
}

function dismissAnn(){
  triggerHaptic();
  try{ localStorage.setItem(annDismissKey, '1'); }catch(e){}
  closeAnn();
}

function closeAnnIfBg(e){
  if(e.target.id === 'ann-overlay') closeAnn();
}

/* ══ SERVICE WORKER — offline support ════════════════════════════ */
if('serviceWorker' in navigator){
  // Inline SW as blob so the single-file app works without a server
  const swCode = `
const CACHE = 'hscvb-sw-v1';
const FONTS = [
  'https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Noto+Serif+Bengali:wght@500;600;700&display=swap'
];
self.addEventListener('install', e => {
  self.skipWaiting();
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(FONTS).catch(()=>{})));
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  const url = e.request.url;
  // Cache-first for fonts & static; network-first for CSV
  if(url.includes('docs.google.com')){
    e.respondWith(
      fetch(e.request).catch(() => caches.match(e.request))
    );
    return;
  }
  if(url.startsWith('http')){
    e.respondWith(
      caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
        if(res && res.status === 200){
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => cached))
    );
  }
});`;
  try{
    const blob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, {scope:'/'}).catch(()=>{});
  }catch(e){}
}

  }
}
